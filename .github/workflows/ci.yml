name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Required gate: the bytecode VM is the canonical backend, so its tests (plus
  # the shared front end) must pass on every platform. This builds VM-only
  # (`-D DUNE_ENABLE_NATIVE=OFF`), so it needs no LLVM toolchain — macOS uses the
  # preinstalled Apple clang instead of `brew install llvm`. Linting still runs
  # on Linux, where clang-format/clang-tidy are cheap to install.
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install tools on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy ninja-build

      - name: Install tools on macOS
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install tools on Windows
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y
          choco install ninja -y
          echo "C:/Program Files/LLVM/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: |
          lint_flag="-D DUNE_ENABLE_LINT=OFF"
          if [ "$RUNNER_OS" = "Linux" ]; then
            lint_flag="-D DUNE_ENABLE_LINT=ON"
          fi
          cmake -S . -B build -G Ninja -D CMAKE_CXX_COMPILER=clang++ -D DUNE_ENABLE_NATIVE=OFF "$lint_flag"

      - name: Build
        run: cmake --build build -j

      - name: Test (VM / core)
        run: ctest --test-dir build -E cli_build_native --output-on-failure

  # Best-effort: the native LLVM backend may lag the VM, so its tests run on a
  # single platform and never block a merge (see AGENTS.md "Backends").
  native-backend:
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -D CMAKE_CXX_COMPILER=clang++ -D DUNE_ENABLE_NATIVE=ON -D DUNE_ENABLE_LINT=OFF

      - name: Build
        run: cmake --build build -j

      - name: Native backend tests
        run: ctest --test-dir build -R cli_build_native --output-on-failure
