name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM tools on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy ninja-build

      - name: Install LLVM tools on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM tools on Windows
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y
          choco install ninja -y
          echo "C:/Program Files/LLVM/bin" >> "$GITHUB_PATH"

      - name: Load MSVC environment on Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: |
          lint_flag="-D DUNE_ENABLE_LINT=ON"
          if [ "$RUNNER_OS" = "Windows" ]; then
            lint_flag="-D DUNE_ENABLE_LINT=OFF"
          fi
          cmake -S . -B build -G Ninja -D CMAKE_CXX_COMPILER=clang++ "$lint_flag"

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
